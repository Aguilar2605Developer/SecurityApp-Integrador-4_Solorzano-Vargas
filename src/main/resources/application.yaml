spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:postgresql://ep-falling-wave-ai8pan4a-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://cognito-idp.us-east-1.amazonaws.com/${COGNITO_USER_POOL_ID:us-east-1_X4BJvA1pT}

app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:8100}
  admin:
    email: ${ADMIN_EMAIL:}

cognito:
  user-pool-id: ${COGNITO_USER_POOL_ID:us-east-1_X4BJvA1pT}
  client-id: ${COGNITO_CLIENT_ID:}
  region: ${COGNITO_REGION:us-east-1}

logging:
  level:
    org.springframework.security: DEBUG